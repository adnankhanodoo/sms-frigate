    <style>
      /* SMS Sentinel AI Custom Theme */
      :root {
        --primary: #1B4F8A !important;
      }
      /* Header/Sidebar color */
      .bg-primary { background-color: #1B4F8A !important; }
      /* Hide Frigate branding text */
      .frigate-logo-text { display: none !important; }
    </style>

    <style>
      /* SMS Sentinel AI — Custom Theme */
      
      /* Sidebar background */
      aside, nav, [class*="sidebar"] {
        background: linear-gradient(180deg, #0a1628 0%, #1B4F8A 100%) !important;
      }

      /* Primary color override */
      :root {
        --primary: #1B4F8A;
      }

      /* Top bar */
      header, [class*="header"] {
        background-color: #0a1628 !important;
        border-bottom: 2px solid #1B4F8A !important;
      }

      /* Buttons */
      button[class*="primary"], [class*="btn-primary"] {
        background-color: #1B4F8A !important;
      }

      /* Active nav item */
      [class*="active"] svg {
        color: #4da6ff !important;
      }

      /* Camera card */
      [class*="camera-card"], [class*="CameraCard"] {
        border: 1px solid #1B4F8A !important;
        border-radius: 8px !important;
      }

      /* Bottom status bar */
      [class*="system"] {
        background-color: #0a1628 !important;
        color: #4da6ff !important;
      }

      /* Logo area — inject SMS text */
      aside > div:first-child::before,
      nav > div:first-child::before {
        content: "SMS NVR";
        color: white;
        font-size: 14px;
        font-weight: bold;
        padding: 8px;
        display: block;
        text-align: center;
        letter-spacing: 2px;
        border-bottom: 1px solid #1B4F8A;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0a1628; }
      ::-webkit-scrollbar-thumb { background: #1B4F8A; border-radius: 3px; }
    </style>
